<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AlexSoftwhiteGame</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0e0e0e;
    color: white;
    text-align: center;
}

.screen {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

button {
    padding: 15px 30px;
    margin: 10px;
    font-size: 16px;
    background: #222;
    color: white;
    border: 1px solid white;
}
</style>
</head>
<body>

<!-- Главное меню -->
<div id="menu" class="screen active">
    <h1>Pax Realis</h1>
    <p>Выберите временной период</p>

    <button onclick="selectEra('Ancient')">Древний мир</button>
    <button onclick="selectEra('Medieval')">Средневековье</button>
    <button onclick="selectEra('Modern')">Новое время</button>

    <br><br>
    <button onclick="startGame()">Начать игру</button>
</div>

<!-- Игровой экран -->
<div id="game" class="screen">
    <h2 id="eraTitle"></h2>

    <div style="position:relative; display:inline-block; max-width:100%;">

        <!-- Карта -->
        <img src="world.svg" style="width:100%; height:auto; display:block;">

        <!-- Невидимая зона Украины -->
        <div onclick="selectCountry('Ukraine')" 
             style="
             position:absolute;
             left:55%;
             top:45%;
             width:8%;
             height:8%;
             cursor:pointer;">
        </div>

    </div>

    <div id="countryPanel" style="margin-top:20px; display:none;">
        <h3 id="countryName"></h3>
        <p>Население: <span id="pop"></span></p>
        <p>Экономика: <span id="eco"></span></p>
    </div>

    <button onclick="nextTurn()">Следующий ход</button>
    <p id="turnInfo">Ход: 1</p>
</div>

<script>
let selectedEra = null;
let turn = 1;

function selectEra(era) {
    selectedEra = era;
    alert("Вы выбрали: " + era);
}

function startGame() {
    if (!selectedEra) {
        alert("Выберите эпоху!");
        return;
    }

    document.getElementById("menu").classList.remove("active");
    document.getElementById("game").classList.add("active");
    document.getElementById("eraTitle").innerText = "Эпоха: " + selectedEra;
}

function nextTurn() {
    turn++;
    document.getElementById("turnInfo").innerText = "Ход: " + turn;
}

const countries = {
    Ukraine: {
        population: 40,
        economy: 30
    }
};

function selectCountry(name) {
    const country = countries[name];

    document.getElementById("countryPanel").style.display = "block";
    document.getElementById("countryName").innerText = name;
    document.getElementById("pop").innerText = country.population;
    document.getElementById("eco").innerText = country.economy;
}

</script>

</body>
</html>

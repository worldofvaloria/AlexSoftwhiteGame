<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Strategy</title>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

#game {
    margin-top: 40px;
}

button {
    padding: 10px 20px;
    margin-top: 20px;
    background: #ff5722;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>World Strategy</h1>

<div id="game">
    <h2>Год: <span id="year"></span></h2>

    <div id="countryPanel">
    <h3 id="countryName"></h3>
    <p>Население: <span id="pop"></span></p>
    <p>Золото: <span id="gold"></span></p>
    <p>Армия: <span id="army"></span></p>
    <p>Стабильность: <span id="stability"></span></p>

    <button onclick="recruitArmy()">
        Нанять войска (-5 золота)
    </button>
</div>
<hr>

<h3>Дипломатия</h3>

<select id="diplomacyTarget" onchange="updateRelationDisplay()"></select>

<p>Отношения: <span id="relationValue"></span></p>

<button onclick="improveRelations()">Улучшить отношения (-5 золота)</button>
<button onclick="insultCountry()">Оскорбить</button>

<div id="chatBox" style="margin-top:20px; min-height:60px;"></div>
    <button onclick="nextTurn()">Следующий ход</button>
</div>

<script>

const game = {
    year: 500,
    selectedCountry: "Valoria",
    countries: {}
};

function createCountry(name) {
    return {
        name,
        population: 10,
        gold: 20,
        army: 5,
        stability: 80,
        tech: 10,
        relations: {}
    };
}

game.countries = {
    Valoria: createCountry("Valoria"),
    Norvind: createCountry("Norvind"),
    Kharad: createCountry("Kharad"),
    Elyndor: createCountry("Elyndor"),
    Zareth: createCountry("Zareth")
};

// Инициализация отношений
for (let name in game.countries) {
    for (let other in game.countries) {
        if (name !== other) {
            game.countries[name].relations[other] =
                Math.floor(Math.random() * 40) - 20; // от -20 до +20
        }
    }
}

function nextTurn() {
    game.year++;

    for (let name in game.countries) {
        let c = game.countries[name];

        // Экономика
        let income = Math.floor(c.population * 0.4);
        let armyCost = Math.floor(c.army * 0.3);

        c.gold += income - armyCost;

        // Рост населения
        c.population += c.population * 0.015;

        // Стабильность падает если нет золота
        if (c.gold < 0) {
            c.stability -= 5;
        }

        // Мятеж
        if (c.stability < 30) {
            c.army = Math.max(1, c.army - 1);
        }
    }

    render();
}

function recruitArmy() {
    let c = game.countries[game.selectedCountry];

    if (c.gold >= 5) {
        c.gold -= 5;
        c.army += 1;
    }

    render();
}

function render() {
    const c = game.countries[game.selectedCountry];

    document.getElementById("year").innerText = game.year;
    document.getElementById("countryName").innerText = c.name;
    document.getElementById("pop").innerText = c.population.toFixed(1);
    document.getElementById("gold").innerText = c.gold;
    document.getElementById("army").innerText = c.army;
    document.getElementById("stability").innerText = c.stability.toFixed(0);
updateDiplomacyUI();
}
    function updateDiplomacyUI() {
    const select = document.getElementById("diplomacyTarget");
    select.innerHTML = "";

    for (let name in game.countries) {
        if (name !== game.selectedCountry) {
            let option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
        }
    }

    updateRelationDisplay();
}

function updateRelationDisplay() {
    let target = document.getElementById("diplomacyTarget").value;
    let relation =
        game.countries[game.selectedCountry].relations[target];

    document.getElementById("relationValue").innerText = relation;
}

function improveRelations() {
    let player = game.countries[game.selectedCountry];
    let target = document.getElementById("diplomacyTarget").value;

    if (player.gold >= 5) {
        player.gold -= 5;
        player.relations[target] += 10;

        addChatMessage(target + " благодарит вас за поддержку.");
    }

    render();
    updateRelationDisplay();
}

function insultCountry() {
    let player = game.countries[game.selectedCountry];
    let target = document.getElementById("diplomacyTarget").value;

    player.relations[target] -= 15;

    addChatMessage(target + " возмущены вашим поведением!");

    updateRelationDisplay();
}

function addChatMessage(text) {
    let chat = document.getElementById("chatBox");
    chat.innerHTML =
        "<p>" + text + "</p>" + chat.innerHTML;
}
render();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Strategy</title>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

#game {
    margin-top: 40px;
}

button {
    padding: 10px 20px;
    margin-top: 20px;
    background: #ff5722;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>World Strategy</h1>

<div id="game">
    <h2>Год: <span id="year"></span></h2>

    <div id="countryPanel">
        <h3 id="countryName"></h3>
        <p>Население: <span id="pop"></span></p>
        <p>Золото: <span id="gold"></span></p>
        <p>Армия: <span id="army"></span></p>
    </div>

    <button onclick="nextTurn()">Следующий ход</button>
</div>

<script>

const game = {
    year: 1200,
    selectedCountry: "France",
    countries: {}
};

function createCountry(name, population, gold, army) {
    return {
        name,
        population,
        gold,
        army,
        stability: 50
    };
}

game.countries = {
    France: createCountry("France", 8, 5, 3),
    England: createCountry("England", 5, 4, 2)
};

function nextTurn() {
    game.year++;

    for (let name in game.countries) {
        let c = game.countries[name];

        c.gold += Math.floor(c.population * 0.2);
        c.population += c.population * 0.01;
    }

    render();
}

function render() {

    document.getElementById("year").innerText = game.year;

    const c = game.countries[game.selectedCountry];

    document.getElementById("countryName").innerText = c.name;
    document.getElementById("pop").innerText = c.population.toFixed(1);
    document.getElementById("gold").innerText = c.gold;
    document.getElementById("army").innerText = c.army;
}

render();

</script>

</body>
</html>

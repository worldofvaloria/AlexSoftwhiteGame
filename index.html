<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AlexSoftwhiteGame</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0e0e0e;
    color: white;
    text-align: center;
}

.screen {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

button {
    padding: 15px 30px;
    margin: 10px;
    font-size: 16px;
    background: #222;
    color: white;
    border: 1px solid white;
}
</style>
</head>
<body>

<!-- Главное меню -->
<div id="menu" class="screen active">
    <h1>Pax Realis</h1>
    <p>Выберите временной период</p>

    <button onclick="selectEra('Ancient')">Древний мир</button>
    <button onclick="selectEra('Medieval')">Средневековье</button>
    <button onclick="selectEra('Modern')">Новое время</button>

    <br><br>
    <button onclick="startGame()">Начать игру</button>
</div>

<!-- Игровой экран -->
<div id="game" class="screen">
    <h2 id="eraTitle"></h2>

    <div style="position:relative; display:inline-block; max-width:100%;">

        <!-- Карта -->
<div id="map"></div>

<script>
let selectedEra = null;
let turn = 1;

const countries = {
    Ukraine: {
        population: 40,
        economy: 30
    }
};

function selectEra(era) {
    selectedEra = era;
    alert("Вы выбрали: " + era);
}

function startGame() {
    if (!selectedEra) {
        alert("Выберите эпоху!");
        return;
    }

    document.getElementById("menu").classList.remove("active");
    document.getElementById("game").classList.add("active");
    document.getElementById("eraTitle").innerText = "Эпоха: " + selectedEra;
}

function nextTurn() {
    turn++;
    document.getElementById("turnInfo").innerText = "Ход: " + turn;
}

/* 🔥 ГЛАВНОЕ — ЗАГРУЗКА КАРТЫ */

d3.json("world.geojson").then(function(data) {

    const width = 1000;
    const height = 500;

    const svg = d3.select("#map")
        .append("svg")
        .attr("width", "100%")
        .attr("viewBox", `0 0 ${width} ${height}`)
        .style("background", "#111");

    const projection = d3.geoMercator()
        .scale(130)
        .translate([width / 2, height / 1.5]);

    const path = d3.geoPath().projection(projection);

    svg.selectAll("path")
        .data(data.features)
        .enter()
        .append("path")
        .attr("d", path)
        .attr("fill", "#e0e0e0")
        .attr("stroke", "#333")
        .attr("stroke-width", 0.5)
        .style("cursor", "pointer")
        .on("click", function(event, d) {

            d3.selectAll("path").attr("fill", "#e0e0e0");
            d3.select(this).attr("fill", "#ff5722");

            const name = d.properties.name;

            document.getElementById("countryPanel").style.display = "block";
            document.getElementById("countryName").innerText = name;

            if (countries[name]) {
                document.getElementById("pop").innerText = countries[name].population;
                document.getElementById("eco").innerText = countries[name].economy;
            } else {
                document.getElementById("pop").innerText = "—";
                document.getElementById("eco").innerText = "—";
            }

        });

});
</script>

<script src="https://d3js.org/d3.v7.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pax Historia: Redux</title>
    <style>
        :root { --bg: #0f0f12; --panel: #1a1a20; --accent: #ff5722; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; }
        
        #game-container { width: 950px; display: grid; grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr auto; gap: 15px; padding: 20px; }
        
        header { grid-column: 1 / span 2; background: var(--panel); padding: 15px; border-radius: 8px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        
        .panel { background: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        
        #stats-panel { grid-row: 2; }
        #main-view { grid-row: 2; display: flex; flex-direction: column; gap: 15px; }
        
        #log { height: 200px; overflow-y: auto; background: #000; font-family: monospace; font-size: 13px; padding: 10px; border: 1px solid #444; color: #aaa; }
        .event-new { color: #fff; border-left: 3px solid var(--accent); padding-left: 5px; margin-bottom: 5px; }

        button { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--accent); border-color: var(--accent); }
        .btn-primary { background: var(--accent); border: none; font-weight: bold; width: 100%; padding: 15px; margin-top: 10px; }
        
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #2a2a2a; }
        .stat-val { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div id="current-date">1 Января 500 г.</div>
        <div id="player-country-name">Загрузка...</div>
        <div>Золото: <span id="top-gold" class="stat-val">0</span></div>
    </header>

    <aside id="stats-panel" class="panel">
        <h3>Состояние страны</h3>
        <div class="stat-line"><span>Население:</span> <span id="stat-pop" class="stat-val">0</span></div>
        <div class="stat-line"><span>Армия:</span> <span id="stat-army" class="stat-val">0</span></div>
        <div class="stat-line"><span>Стабильность:</span> <span id="stat-stab" class="stat-val">0</span></div>
        <div class="stat-line"><span>Доход (мес):</span> <span id="stat-income" class="stat-val">0</span></div>
        <hr>
        <button onclick="recruitArmy()">Нанять полк (5 золота)</button>
        <button onclick="openConstruction()">Строительство</button>
    </aside>

    <main id="main-view">
        <div id="map-or-diplomacy" class="panel" style="flex-grow: 1;">
            <h3>Мировые новости</h3>
            <div id="log"></div>
        </div>
        
        <div class="panel">
            <select id="time-step">
                <option value="1">1 день</option>
                <option value="7">1 неделя</option>
                <option value="30">1 месяц</option>
            </select>
            <button class="btn-primary" onclick="engine.nextTurn()">СЛЕДУЮЩИЙ ХОД</button>
        </div>
    </main>
</div>

<script>
// 1. Все данные игры хранятся здесь
const buildingCatalog = {
    market: { name: "Рынок", cost: 30, time: 60, effect: "income", value: 0.5, desc: "+0.5 золота/мес" },
    barracks: { name: "Казармы", cost: 40, time: 90, effect: "upkeep", value: 0.2, desc: "-20% цена армии" },
    farm: { name: "Ферма", cost: 20, time: 45, effect: "pop", value: 0.002, desc: "+0.2% рост населения" }
};
    const world = {
    date: { day: 1, month: 0, year: 500 },
    months: ["Января", "Февраля", "Марта", "Апреля", "Мая", "Июня", "Июля", "Августа", "Сентября", "Октября", "Ноября", "Декабря"],
    playerCountry: "Valoria",
    countries: {
        "Valoria": { pop: 10000, gold: 50, army: 100, stab: 85, buildings: {}, constructionQueue: [], relations: {} },
        "Norvind": { pop: 12000, gold: 40, army: 200, stab: 80, buildings: {}, constructionQueue: [], relations: {} },
        "Kharad":  { pop: 8000,  gold: 60, army: 50,  stab: 90, buildings: {}, constructionQueue: [], relations: {} },
        "Elyndor": { pop: 9500,  gold: 45, army: 120, stab: 88, buildings: {}, constructionQueue: [], relations: {} }
    }
};

// 2. Инициализация отношений (запускается один раз при старте)
for (let name in world.countries) {
    for (let other in world.countries) {
        if (name !== other) {
            world.countries[name].relations[other] = Math.floor(Math.random() * 40) - 20; 
        }
    }
}

// 3. Главный движок игры
const engine = {
    // Переход на следующий ход
    nextTurn() {
        const steps = parseInt(document.getElementById('time-step').value);
        
        for (let i = 0; i < steps; i++) {
            this.processDay();
        }
        this.updateUI();
    },

   processDay() {
        world.date.day++;
        
        for (let name in world.countries) {
            let c = world.countries[name];
            for (let i = c.constructionQueue.length - 1; i >= 0; i--) {
                let job = c.constructionQueue[i];
                job.daysLeft--;

                if (job.daysLeft <= 0) {
                    let bId = job.id;
                    c.buildings[bId] = (c.buildings[bId] || 0) + 1;
                    c.constructionQueue.splice(i, 1);
                    
                    if (name === world.playerCountry) {
                        logEvent(`Ура! Постройка ${buildingCatalog[bId].name} завершена.`);
                    }
                }
            }
        }

        if (world.date.day > 30) {
            world.date.day = 1;
            world.date.month++;
            if (world.date.month > 11) {
                world.date.month = 0;
                world.date.year++;
            }
            this.processMonth();
        }
    },

    processMonth() {
    for (let name in world.countries) {
        let c = world.countries[name];
        
        // Считаем бонусы от построек
        let marketBonus = (c.buildings.market || 0) * 0.5; // Каждый рынок дает +0.5 золота
        let farmBonus = (c.buildings.farm || 0) * 0.002;  // Каждая ферма ускоряет рост населения
        
        // Экономика с учетом зданий
        let income = (c.pop * 0.01) + marketBonus; 
        let upkeep = (c.army * 0.05);
        c.gold += (income - upkeep);
        
        // Рост населения с учетом ферм
        c.pop += Math.floor(c.pop * (0.001 + farmBonus));
    }
    
    if (typeof runAIBehavior === "function") {
        runAIBehavior(); 
    }
    this.updateUI(); // Обновляем цифры на экране
},
       updateUI() {
        const p = world.countries[world.playerCountry];

        // Дата и название страны
        document.getElementById('date').innerText = `${world.date.day} ${["Янв", "Фев", "Мар", "Апр", "Май", "Июн", "Июл", "Авг", "Сен", "Окт", "Ноя", "Дек"][world.date.month]} ${world.date.year}`;
        document.getElementById('country-name').innerText = world.playerCountry;

        // Статистика в шапке и боковой панели
        document.getElementById('gold').innerText = Math.floor(p.gold);
        document.getElementById('pop').innerText = p.pop.toLocaleString();
        document.getElementById('army').innerText = p.army;
        document.getElementById('stab').innerText = p.stab + "%";

        // Расчет месячного баланса для интерфейса
        let income = (p.pop * 0.01) + (p.buildings.market || 0) * 0.5;
        let upkeep = (p.army * 0.05);
        let monthlyBalance = (income - upkeep).toFixed(1);
        document.getElementById('income-display').innerText = `(${monthlyBalance >= 0 ? "+" : ""}${monthlyBalance})`;
    },

    syncDiplomacyList() {
        const dipSelect = document.getElementById('dip-target');
        if (!dipSelect) return;

        if (dipSelect.options.length === 0) {
            for (let name in world.countries) {
                if (name !== world.playerCountry) {
                    let opt = document.createElement('option');
                    opt.value = name;
                    opt.innerText = name;
                    dipSelect.appendChild(opt);
                }
            }
        }
        
        // Показ отношений с выбранной страной
        let target = dipSelect.value;
        if (target) {
            document.getElementById('dip-rel-val').innerText = world.countries[world.playerCountry].relations[target];
        }
    }
};

// 4. Лог событий (текстовое поле)
function logEvent(text) {
    const logDiv = document.getElementById('log');
    if (!logDiv) return;
    const entry = document.createElement('div');
    entry.className = 'event-new';
    entry.innerText = `[${world.date.year}] ${text}`;
    logDiv.prepend(entry);
}

// === ВСТАВЛЯЕМ СЮДА ===

const diplomacy = {
    improve() {
        const p = world.countries[world.playerCountry];
        const targetName = document.getElementById('dip-target').value;
        const cost = 10;

        if (p.gold >= cost) {
            p.gold -= cost;
            world.countries[world.playerCountry].relations[targetName] += 15;
            logEvent(`Мы отправили щедрые дары в ${targetName}. Отношения улучшились.`);
            engine.updateUI();
        } else {
            logEvent("Казна пуста! Мы не можем позволить себе такие подарки.");
        }
    },
    insult() {
        const targetName = document.getElementById('dip-target').value;
        world.countries[world.playerCountry].relations[targetName] -= 20;
        logEvent(`Наш посол высмеял манеры правителя ${targetName}. Отношения испорчены.`);
        engine.updateUI();
    }
};

function runAIBehavior() {
    for (let name in world.countries) {
        if (name === world.playerCountry) continue;
        let c = world.countries[name];

        if (Math.random() < 0.1) {
            let change = Math.floor(Math.random() * 11) - 5;
            c.relations[world.playerCountry] += change;
            if (change < -3) logEvent(`Газеты страны ${name} публикуют карикатуры на нас.`);
            else if (change > 3) logEvent(`${name} выражает заинтересованность в торговле.`);
        }

        if (c.gold > 60) {
            c.gold -= 10;
            c.army += 25;
        }
    }
}
 function openConstruction() {
    document.getElementById('build-modal').style.display = 'block';
    const list = document.getElementById('build-list');
    list.innerHTML = '';

    for (let id in buildingCatalog) {
        let b = buildingCatalog[id];
        let btn = document.createElement('button');
        btn.style.width = "100%";
        btn.style.textAlign = "left";
        btn.style.marginBottom = "10px";
        btn.style.padding = "10px";
        btn.innerHTML = `<b>${b.name}</b> <span style="float:right">${b.cost} золота</span><br><small>${b.desc}</small>`;
        btn.onclick = () => startBuilding(id);
        list.appendChild(btn);
    }
}

function closeConstruction() {
    document.getElementById('build-modal').style.display = 'none';
}

function startBuilding(id) {
    let p = world.countries[world.playerCountry];
    let b = buildingCatalog[id];

    if (p.gold >= b.cost) {
        p.gold -= b.cost;
        p.constructionQueue.push({ id: id, daysLeft: b.time });
        logEvent(`Начато строительство: ${b.name}. Будет готово через ${b.time} дн.`);
        closeConstruction();
        engine.updateUI();
    } else {
        logEvent("Недостаточно золота для начала стройки!");
    }
}  
// === КОНЕЦ ВСТАВКИ ===
 
// 5. САМЫЙ ВАЖНЫЙ МОМЕНТ: Первичный запуск
window.onload = () => {
    engine.updateUI();
    logEvent("Мир вступил в эпоху 500-го года. Ваше правление началось.");
};
</script>
      <div id="build-modal" class="panel" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:100; width:400px; background:#1a1a20; border:2px solid #ff5722; padding:20px; box-shadow: 0 0 20px #000;">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #444; pb: 10px;">
        <h3 style="margin:0;">Доступные постройки</h3>
        <button onclick="closeConstruction()" style="background:none; border:none; color:red; font-size:20px; cursor:pointer; margin:0; padding:0;">✖</button>
    </div>
    <div id="build-list" style="margin-top:15px; max-height: 300px; overflow-y: auto;">
        </div>
</div>
</body>
</html>

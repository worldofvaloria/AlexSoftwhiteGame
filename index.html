<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AlexSoftwhiteGame</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0e0e0e;
    color: white;
    text-align: center;
}

.screen {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

button {
    padding: 15px 30px;
    margin: 10px;
    font-size: 16px;
    background: #222;
    color: white;
    border: 1px solid white;
}
</style>
</head>
<body>

<!-- Главное меню -->
<div id="menu" class="screen active">
    <h1>Pax Realis</h1>
    <p>Выберите временной период</p>

    <button onclick="selectEra('Ancient')">Древний мир</button>
    <button onclick="selectEra('Medieval')">Средневековье</button>
    <button onclick="selectEra('Modern')">Новое время</button>

    <br><br>
    <button onclick="startGame()">Начать игру</button>
</div>

<!-- Игровой экран -->
<div id="game" class="screen">
    <h2 id="eraTitle"></h2>
    <p>Игра запущена...</p>
    <button onclick="nextTurn()">Следующий ход</button>
    <p id="turnInfo">Ход: 1</p>
</div>

<script>
let selectedEra = null;
let turn = 1;

function selectEra(era) {
    selectedEra = era;
    alert("Вы выбрали: " + era);
}

function startGame() {
    if (!selectedEra) {
        alert("Выберите эпоху!");
        return;
    }

    document.getElementById("menu").classList.remove("active");
    document.getElementById("game").classList.add("active");
    document.getElementById("eraTitle").innerText = "Эпоха: " + selectedEra;
}

function nextTurn() {
    turn++;
    document.getElementById("turnInfo").innerText = "Ход: " + turn;
}
</script>

</body>
</html>

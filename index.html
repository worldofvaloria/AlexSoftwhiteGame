<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Strategy</title>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

#game {
    margin-top: 40px;
}

button {
    padding: 10px 20px;
    margin-top: 20px;
    background: #ff5722;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>World Strategy</h1>

<div id="game">
    <h2>Год: <span id="year"></span></h2>

    <div id="countryPanel">
    <h3 id="countryName"></h3>
    <p>Население: <span id="pop"></span></p>
    <p>Золото: <span id="gold"></span></p>
    <p>Армия: <span id="army"></span></p>
    <p>Стабильность: <span id="stability"></span></p>

<button onclick="recruitArmy()">
    Нанять войска (-5 золота)
</button>

<hr>

<h3>Строительство</h3>
<div id="constructionMenu"></div>

<hr>

<h3>Дипломатия</h3>

<select id="diplomacyTarget" onchange="updateRelationDisplay()"></select>

<p>Отношения: <span id="relationValue"></span></p>

<button onclick="improveRelations()">Улучшить отношения (-5 золота)</button>
<button onclick="insultCountry()">Оскорбить</button>

<div id="chatBox"
     style="
        margin-top:20px;
        height:180px;
        overflow-y:auto;
        border:1px solid #444;
        padding:10px;
     ">
</div>

<button onclick="toggleHistory()" style="margin-top:10px;">
    История сообщений
</button>

<div id="historyPanel"
     style="
        display:none;
        margin-top:15px;
        max-height:250px;
        overflow-y:auto;
        border:1px solid #666;
        padding:10px;
        background:#1a1a1a;
     ">
</div>
<select id="timeStep">
    <option value="1">1 день</option>
    <option value="7">1 неделя</option>
    <option value="30">1 месяц</option>
    <option value="90">3 месяца</option>
    <option value="180">6 месяцев</option>
    <option value="365">1 год</option>
</select>
<button onclick="nextTurn()" style="margin-top:20px;">
    Следующий ход
</button>
</div>

<script>
const months = [
    "Январь", "Февраль", "Март", "Апрель",
    "Май", "Июнь", "Июль", "Август",
    "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
];
function isLeapYear(year) {
    return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
}

function getDaysInMonth(month, year) {

    const daysInMonths = [
        31,
        isLeapYear(year) ? 29 : 28,
        31,
        30,
        31,
        30,
        31,
        31,
        30,
        31,
        30,
        31
    ];

    return daysInMonths[month - 1];
}

function advanceTime(days) {

    while (days > 0) {

        let daysThisMonth = getDaysInMonth(game.date.month, game.date.year);

        let remainingDaysInMonth = daysThisMonth - game.date.day;

        if (days <= remainingDaysInMonth) {
            game.date.day += days;
            days = 0;
        } else {
            days -= (remainingDaysInMonth + 1);
            game.date.day = 1;
            game.date.month++;

            if (game.date.month > 12) {
                game.date.month = 1;
                game.date.year++;
            }
        }
    }
}
const game = {
    date: {
        day: 1,
        month: 1,
        year: 500
    },
    selectedCountry: "Valoria",
    countries: {}
};
const buildingCatalog = {

    // 🪖 Военное
    barracks: {
        name: "Казармы",
        category: "Военное",
        cost: 18,
        buildTime: 60
    },

    armory: {
        name: "Арсенал",
        category: "Военное",
        cost: 22,
        buildTime: 75
    },

    fortress: {
        name: "Крепость",
        category: "Военное",
        cost: 30,
        buildTime: 120
    },


    // 🎓 Образование
    school: {
        name: "Школа",
        category: "Образование",
        cost: 16,
        buildTime: 50
    },

    university: {
        name: "Университет",
        category: "Образование",
        cost: 28,
        buildTime: 100
    },


    // 🎭 Культура
    theater: {
        name: "Театр",
        category: "Культура",
        cost: 12,
        buildTime: 40
    },

    monument: {
        name: "Монумент",
        category: "Культура",
        cost: 20,
        buildTime: 70
    },


    // 💰 Экономика
    market: {
        name: "Рынок",
        category: "Экономика",
        cost: 14,
        buildTime: 35
    },

    bank: {
        name: "Банк",
        category: "Экономика",
        cost: 26,
        buildTime: 80
    },


    // ⛏ Ресурсы
    farm: {
        name: "Ферма",
        category: "Ресурсы",
        cost: 10,
        buildTime: 30
    },

    mine: {
        name: "Шахта",
        category: "Ресурсы",
        cost: 15,
        buildTime: 45
    },

    lumbermill: {
        name: "Лесопилка",
        category: "Ресурсы",
        cost: 17,
        buildTime: 50
    }
};
    function startConstruction(buildingKey) {
    let country = game.countries[game.selectedCountry];
    let building = buildingCatalog[buildingKey];

    if (country.gold < building.cost) {
        alert("Недостаточно золота!");
        return;
    }

    country.gold -= building.cost;

    country.constructionQueue.push({
        key: buildingKey,
        daysLeft: building.buildTime
    });

    addChatMessage(`Начато строительство: ${building.name}`);
}
function createCountry(name) {
    return {
        name,
        population: 10,
        gold: 20,
        army: 5,
        stability: 80,
        tech: 10,
        relations: {},
        allianceOffered: false,
        allied: false,

        buildings: {},           // построенные здания
        constructionQueue: []    // очередь строительства
    };
}

game.countries = {
    Valoria: createCountry("Valoria"),
    Norvind: createCountry("Norvind"),
    Kharad: createCountry("Kharad"),
    Elyndor: createCountry("Elyndor"),
    Zareth: createCountry("Zareth")
};

// Инициализация отношений
for (let name in game.countries) {
    for (let other in game.countries) {
        if (name !== other) {
            game.countries[name].relations[other] =
                Math.floor(Math.random() * 40) - 20; // от -20 до +20
        }
    }
}

function nextTurn() {

    let days = parseInt(document.getElementById("timeStep").value);

    // --- Экономика и развитие по дням ---
    for (let d = 0; d < days; d++) {

        for (let name in game.countries) {
            let c = game.countries[name];
// обработка строительства
for (let i = c.constructionQueue.length - 1; i >= 0; i--) {
    let item = c.constructionQueue[i];
    item.daysLeft--;

    if (item.daysLeft <= 0) {
        let key = item.key;

        c.buildings[key] = (c.buildings[key] || 0) + 1;

        addChatMessage(`${buildingCatalog[key].name} построено!`);

        c.constructionQueue.splice(i, 1);
    }
}
            // 📈 Доход за день
            let incomePerDay = (c.population * 0.4) / 365;
            let armyCostPerDay = (c.army * 0.3) / 365;

            c.gold += incomePerDay - armyCostPerDay;

            // 👥 Рост населения (1.5% в год)
            c.population += (c.population * 0.015) / 365;

            // ⚖ Стабильность падает при отрицательном золоте
            if (c.gold < 0) {
                c.stability -= 5 / 365;
            }

            // 🔥 Мятеж
            if (c.stability < 30) {
                c.army = Math.max(1, c.army - (1 / 365));
            }
        }
    }

    // 📅 Двигаем календарь
    advanceTime(days);

    // 🔥 Реакция ИИ каждый ход
    for (let name in game.countries) {
        if (name !== game.selectedCountry) {

            if (Math.random() < 0.3) {

                let change = Math.floor(Math.random() * 11) - 5;

                game.countries[name].relations[game.selectedCountry] += change;
                game.countries[game.selectedCountry].relations[name] += change;

                if (change > 0) {
                    addChatMessage(name + " улучшает отношения с вами.");
                }

                if (change < 0) {
                    addChatMessage(name + " ухудшает отношения с вами.");
                }

                let relation =
                    game.countries[game.selectedCountry].relations[name];

                if (relation > 60 && !game.countries[name].allianceOffered) {
                    game.countries[name].allianceOffered = true;
                    addAllianceMessage(name);
                }

                if (relation < -60) {
                    addChatMessage(name + " готовится к конфликту.");
                }
            }
        }
    }

    render();
}
function addAllianceMessage(countryName) {

    let chat = document.getElementById("chatBox");

    let block = document.createElement("div");

    block.innerHTML = `
        <p>${countryName} предлагает вам союз.</p>
        <button onclick="acceptAlliance('${countryName}')">Принять</button>
        <button onclick="rejectAlliance('${countryName}')">Отклонить</button>
    `;

    chat.append(block);
    chat.scrollTop = chat.scrollHeight;

    messageHistory.push(countryName + " предлагает вам союз.");

    if (chat.children.length > 15) {
        chat.removeChild(chat.firstChild);
    }

    updateHistoryPanel();
}
    function acceptAlliance(name) {
    let player = game.countries[game.selectedCountry];
    let other = game.countries[name];

    player.relations[name] = 100;
    other.relations[game.selectedCountry] = 100;

    other.allianceOffered = false;

    addChatMessage(name + " теперь ваш союзник!");

    render();
}

function rejectAlliance(name) {
    let player = game.countries[game.selectedCountry];
    let other = game.countries[name];

    player.relations[name] -= 20;
    other.relations[game.selectedCountry] -= 20;

    other.allianceOffered = false;

    addChatMessage("Вы отказались от союза с " + name + ".");

    render();
}
function recruitArmy() {
    let c = game.countries[game.selectedCountry];

    if (c.gold >= 5) {
        c.gold -= 5;
        c.army += 1;
    }

    render();
}
function renderConstructionMenu() {

    const menu = document.getElementById("constructionMenu");
    if (!menu) return;

    menu.innerHTML = "";

    for (let key in buildingCatalog) {

        let building = buildingCatalog[key];

        let btn = document.createElement("button");
        btn.innerText = `${building.name} (${building.cost} золота)`;
        btn.onclick = () => startConstruction(key);

        menu.appendChild(btn);
        menu.appendChild(document.createElement("br"));
    }
}

function render() {
    const c = game.countries[game.selectedCountry];

    document.getElementById("year").innerText =
    game.date.day + " " +
    months[game.date.month - 1] + " " +
    game.date.year;
    document.getElementById("countryName").innerText = c.name;
    document.getElementById("pop").innerText = c.population.toFixed(1);

// 📊 Месячный баланс
let monthlyIncome = (c.population * 0.4) / 12;
let monthlyArmyCost = (c.army * 0.3) / 12;
let monthlyBalance = monthlyIncome - monthlyArmyCost;

let goldText = c.gold.toFixed(2);

let balanceText = monthlyBalance >= 0
    ? `(+${monthlyBalance.toFixed(2)} / мес)`
    : `(${monthlyBalance.toFixed(2)} / мес)`;

document.getElementById("gold").innerText =
    `${goldText} ${balanceText}`;

document.getElementById("army").innerText = c.army;
    document.getElementById("stability").innerText = c.stability.toFixed(0);
updateDiplomacyUI();
renderConstructionMenu();
}
    function updateDiplomacyUI() {
    const select = document.getElementById("diplomacyTarget");
    select.innerHTML = "";

    for (let name in game.countries) {
        if (name !== game.selectedCountry) {
            let option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
        }
    }

    updateRelationDisplay();
}

function updateRelationDisplay() {
    let target = document.getElementById("diplomacyTarget").value;
    let relation =
        game.countries[game.selectedCountry].relations[target];

    document.getElementById("relationValue").innerText = relation;
}

function improveRelations() {
    let player = game.countries[game.selectedCountry];
    let target = document.getElementById("diplomacyTarget").value;

    if (player.gold >= 5) {
        player.gold -= 5;
        player.relations[target] += 10;

        addChatMessage(target + " благодарит вас за поддержку.");
    }

    render();
    updateDiplomacyUI();
}

function insultCountry() {
    let player = game.countries[game.selectedCountry];
    let target = document.getElementById("diplomacyTarget").value;

    player.relations[target] -= 15;

    addChatMessage(target + " возмущены вашим поведением!");

    updateRelationDisplay();
}

let messageHistory = [];

function addChatMessage(text) {
    let chat = document.getElementById("chatBox");

    let p = document.createElement("p");
    p.innerText = text;

    chat.append(p);
    chat.scrollTop = chat.scrollHeight;

    messageHistory.push(text);

    // лимит 15 сообщений в основном чате
    if (chat.children.length > 15) {
        chat.removeChild(chat.firstChild);
    }

    updateHistoryPanel();
}
render();
function updateHistoryPanel() {
    let panel = document.getElementById("historyPanel");
    panel.innerHTML = "";

    messageHistory.slice().reverse().forEach(msg => {
        let p = document.createElement("p");
        p.innerText = msg;
        panel.appendChild(p);
    });
}

function toggleHistory() {
    let panel = document.getElementById("historyPanel");

    if (panel.style.display === "none") {
        panel.style.display = "block";
    } else {
        panel.style.display = "none";
    }
}
</script>

</body>
</html>
